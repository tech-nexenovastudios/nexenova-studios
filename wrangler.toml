# Cloudflare Pages configuration for Nexenova Studios
name = "nexenova-studios"
compatibility_date = "2024-09-23"

# Vite writes the built site to ./dist
pages_build_output_dir = "./dist"

# Build settings (also configurable in the Cloudflare dashboard)
#   Build command:    npm run build
#   Deploy command:   npx wrangler pages deploy dist
#   Output directory: dist

# Environment variables — set these in the Cloudflare dashboard
# (Settings → Environment variables) rather than committing them.
# [vars]
# NODE_ENV = "production"
