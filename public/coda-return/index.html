<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="robots" content="noindex,nofollow" />
  <meta name="referrer" content="no-referrer" />
  <meta name="theme-color" content="#0a0a0a" />
  <link rel="icon" type="image/svg+xml" href="/logo.svg" />
  <title>Park Escape — Payment received</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --bg-2: #12101a;
      --card: rgba(255, 255, 255, 0.04);
      --border: rgba(255, 255, 255, 0.09);
      --text: #f4f4f6;
      --muted: #a1a1ac;
      --accent: #8b5cf6;      /* violet-500 */
      --accent-2: #a78bfa;    /* violet-400 */
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      background:
        radial-gradient(1200px 600px at 50% -10%, rgba(139, 92, 246, 0.18), transparent 60%),
        linear-gradient(180deg, var(--bg-2), var(--bg) 55%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: max(24px, env(safe-area-inset-top)) 20px max(24px, env(safe-area-inset-bottom));
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 36px 26px 30px;
      text-align: center;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }
    .spinner {
      width: 56px;
      height: 56px;
      margin: 4px auto 22px;
      border-radius: 50%;
      border: 4px solid rgba(139, 92, 246, 0.22);
      border-top-color: var(--accent-2);
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .check {
      width: 56px; height: 56px; margin: 4px auto 22px;
      display: none; align-items: center; justify-content: center;
      border-radius: 50%;
      background: rgba(139, 92, 246, 0.15);
      color: var(--accent-2);
    }
    .check svg { width: 30px; height: 30px; }
    h1 {
      font-size: 21px;
      line-height: 1.3;
      margin: 0 0 10px;
      font-weight: 650;
      letter-spacing: -0.01em;
    }
    p {
      font-size: 15px;
      line-height: 1.55;
      color: var(--muted);
      margin: 0 auto;
      max-width: 34ch;
    }
    .btn {
      display: inline-block;
      width: 100%;
      margin-top: 26px;
      padding: 15px 22px;
      font-size: 16px;
      font-weight: 650;
      text-decoration: none;
      color: #fff;
      border: 0;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--accent), #6d28d9);
      box-shadow: 0 8px 22px rgba(109, 40, 217, 0.4);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .btn:active { transform: translateY(1px); }
    .hint {
      margin-top: 16px;
      font-size: 13px;
      color: var(--muted);
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    .hint.show { opacity: 1; }
    .foot {
      margin-top: 22px;
      font-size: 12px;
      color: rgba(161, 161, 172, 0.7);
    }
  </style>
</head>
<body>
  <main class="card" role="main">
    <div id="spinner" class="spinner" aria-hidden="true"></div>
    <div id="check" class="check" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
           stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
    </div>

    <h1 id="title">Payment received</h1>
    <p id="msg">Returning you to Park Escape&hellip;</p>

    <!-- href is set by JS with URL-encoded params; noscript fallback below -->
    <a id="returnBtn" class="btn" href="parkescape://coda-return" rel="noopener">Return to Park Escape</a>

    <p id="hint" class="hint">
      You can now switch back to Park Escape — your coins will appear shortly.
    </p>

    <p class="foot">Nexenova Studios</p>
  </main>

  <noscript>
    <div style="position:fixed;left:0;right:0;bottom:0;padding:14px;text-align:center;
                font:14px -apple-system,sans-serif;color:#a1a1ac;background:#12101a;
                border-top:1px solid rgba(255,255,255,.09)">
      Tap <strong style="color:#f4f4f6">Return to Park Escape</strong> above to go back to the game.
    </div>
  </noscript>

  <script>
    (function () {
      "use strict";

      // --- Read + sanitize query params (untrusted). Never inject into DOM as HTML. ---
      var params = new URLSearchParams(window.location.search);
      var rawTxn = params.get("TxnId") || "";
      var rawOrder = params.get("OrderId") || "";

      // TxnId: numeric only. OrderId: string, cap at 64 chars per Coda spec.
      var txnId = (/^\d+$/.test(rawTxn)) ? rawTxn : "";
      var orderId = rawOrder.slice(0, 64);

      // Build deep link with URL-encoded values.
      var deepLink = "parkescape://coda-return";
      var qp = [];
      if (txnId) qp.push("TxnId=" + encodeURIComponent(txnId));
      if (orderId) qp.push("OrderId=" + encodeURIComponent(orderId));
      if (qp.length) deepLink += "?" + qp.join("&");

      var btn = document.getElementById("returnBtn");
      btn.setAttribute("href", deepLink);

      // Manual button: attempt via location too (some browsers block <a> for custom schemes).
      btn.addEventListener("click", function (e) {
        e.preventDefault();
        openApp();
      });

      function openApp() {
        try { window.location.href = deepLink; } catch (err) { /* no app handler */ }
      }

      // --- Auto-attempt the deep link on load ---
      // Small delay so the page paints first (avoids a blank flash before the OS prompt).
      setTimeout(openApp, 350);

      // --- Fallback: if the app didn't take over within ~2s, show the switch-back hint ---
      var switched = false;
      function markSwitched() { switched = true; }
      // If the app opens, the browser tab is backgrounded (visibility hidden / pagehide).
      document.addEventListener("visibilitychange", function () {
        if (document.visibilityState === "hidden") markSwitched();
      });
      window.addEventListener("pagehide", markSwitched);
      window.addEventListener("blur", markSwitched);

      setTimeout(function () {
        if (switched) return; // app opened — leave the "returning" state as-is
        // Deep link likely blocked / app not installed: settle into a calm resting state.
        var sp = document.getElementById("spinner");
        var ck = document.getElementById("check");
        sp.style.display = "none";
        ck.style.display = "flex";
        document.getElementById("title").textContent = "Payment received";
        document.getElementById("msg").textContent = "You're all set.";
        document.getElementById("hint").classList.add("show");
      }, 2000);
    })();
  </script>
</body>
</html>
